{% extends 'base.html' %}
{% load static %}

{% block title %}Editar Perfil | StreamEvents{% endblock %}

{% block content %}
<div class="mx-auto" style="max-width: 500px;">
    <h1>Editar Perfil</h1>

    <div class="card border-0 shadow-sm rounded-4 p-4 auth-card">

        {# Avatar actual #}
        {% if user.avatar %}
            <div class="text-center mb-4">
                <img src="{{ user.avatar.url }}"
                     alt="Avatar de {{ user.username }}"
                     class="rounded-circle mb-3"
                     width="120" height="120"
                     style="object-fit: cover;">
                <form method="post" action="{% url 'users:remove_avatar' %}">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-outline-danger btn-sm">
                        <i class="bi bi-trash me-1"></i> Eliminar avatar
                    </button>
                </form>
            </div>
        {% endif %}

        {# Formulari #}
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}
            <button class="btn btn-primary w-100 mt-2" type="submit">
                <i class="bi bi-check-lg me-1"></i> Guardar canvis
            </button>
        </form>

    </div>
</div>
{% endblock %}
