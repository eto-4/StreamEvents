{% extends 'base.html' %}

{% block extra_head %}
    {% load static %}
    <style>
        body::before,
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        body::before {
            background-image: url("{% static 'images/background.jpg' %}");
            background-size: cover;
            background-position: center;
            filter: blur(12px) brightness(0.55);
            z-index: -2;
            transform: scale(1.05);
        }
        
        body::after {
            background: rgba(13, 17, 23, 0.75);
            z-index: -1;
        }
    </style>
{% endblock %}

{% block title %}Registre | StreamEvents{% endblock %}

{% block content %}
<div class="mx-auto" style="max-width: 420px;">
    <div class="card border-0 rounded-4 p-4 auth-card">
        <h1 class="mb-4">Registra't</h1>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button class="btn btn-primary w-100 mt-2" type="submit">Registra't</button>
        </form>
        <p class="text-muted helptext text-center mt-3 mb-0">
            Ja tens compte? <a href="{% url 'users:login' %}">Inicia sessió</a>
        </p>
    </div>
</div>
{% endblock %}
