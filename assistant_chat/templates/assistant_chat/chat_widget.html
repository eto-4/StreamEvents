{% load static %}

<link rel="stylesheet" href="{% static 'assistant_chat/css/widget.css' %}">

{# Botó flotant #}
<button id="assistant-toggle" class="assistant-toggle">
    <i class="bi bi-stars"></i>
</button>

{# Panel del xat #}
<div id="assistant-panel" class="assistant-panel">

    {# Capçalera #}
    <div class="assistant-header">
        <span>Assistent d'esdeveniments</span>
        <button id="assistant-close" class="assistant-close">
            <i class="bi bi-x-lg"></i>
        </button>
    </div>

    {# Missatges #}
    <div id="assistant-messages" class="assistant-messages">
        <div class="assistant-hint">
            Pregunta'm sobre esdeveniments!<br>
            <small>Ex: "vull un concert de jazz aquest cap de setmana"</small>
        </div>
    </div>

    {# Footer / Input #}
    <div class="assistant-footer">
        <label class="only-future-label">
            <input type="checkbox" id="only-future"> Només futurs
        </label>
        <div class="assistant-input-row">
            <textarea id="assistant-input" class="assistant-input" rows="1"
                placeholder="Escriu la teva consulta..."></textarea>
            <button id="assistant-send" class="assistant-send">
                <i class="bi bi-send-fill"></i>
            </button>
        </div>
    </div>

</div>

<script src="{% static 'assistant_chat/js/widget.js' %}"></script>
